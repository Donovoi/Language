syntax = "proto3";

package language.session.v1;

enum SessionMode {
  SESSION_MODE_UNSPECIFIED = 0;
  SESSION_MODE_FOCUS = 1;
  SESSION_MODE_CROWD = 2;
  SESSION_MODE_LOCKED = 3;
}

enum LaneStatus {
  LANE_STATUS_UNSPECIFIED = 0;
  LANE_STATUS_IDLE = 1;
  LANE_STATUS_LISTENING = 2;
  LANE_STATUS_TRANSLATING = 3;
  LANE_STATUS_READY = 4;
  LANE_STATUS_ERROR = 5;
}

message ClientConfig {
  string preferred_language_code = 1;
  SessionMode mode = 2;
  uint32 max_active_speakers = 3;
}

message SpeakerState {
  string speaker_id = 1;
  string display_name = 2;
  string language_code = 3;
  float priority = 4;
  bool active = 5;
  bool is_locked = 6;
  bool front_facing = 7;
  float persistence_bonus = 8;
  uint64 last_updated_unix_ms = 9;
  string source_caption = 10;
  string translated_caption = 11;
  string target_language_code = 12;
  LaneStatus lane_status = 13;
  string status_message = 14;
}

message SessionState {
  string session_id = 1;
  SessionMode mode = 2;
  repeated SpeakerState speakers = 3;
  string top_speaker_id = 4;
}

message SpeakerEvent {
  string speaker_id = 1;
  float priority_delta = 2;
  bool active = 3;
  bool is_locked = 4;
  uint64 observed_unix_ms = 5;
  string source_caption = 6;
  string translated_caption = 7;
  string target_language_code = 8;
  LaneStatus lane_status = 9;
  string status_message = 10;
}

message PriorityUpdate {
  string speaker_id = 1;
  float previous_priority = 2;
  float new_priority = 3;
  string reason = 4;
}
