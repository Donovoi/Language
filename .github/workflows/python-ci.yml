name: Python CI

on:
  push:
    branches:
      - main
      - 'copilot/**'
  pull_request:

jobs:
  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - name: Install gateway dependencies
        run: |
          python -m pip install --upgrade pip
          cd services/gateway
          python -m pip install -e '.[dev]'
      - name: Run Ruff
        run: cd services/gateway && python -m ruff check .
      - name: Run pytest
        run: cd services/gateway && python -m pytest
